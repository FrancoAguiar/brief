<!DOCTYPE html>
<html lang="es" class="scroll-smooth overflow-x-hidden">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, viewport-fit=cover">
    <title>BriefEditable™ | @necesitodisenos</title>

    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Inter+Tight:wght@400;500;600;700;800;900&family=Kalam:wght@700&family=Poppins:wght@400;500;600;700;900&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            primary: '#0066FF', /* Azul Neón */
                            hover: '#0052CC',   /* Azul Oscuro */
                            bg: '#0A0A0A',
                            surface: '#121212',
                            card: '#161616',
                            border: '#262626' 
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Inter Tight', 'sans-serif'],
                        poppins: ['Poppins', 'sans-serif'],
                        hand: ['Kalam', 'cursive'],
                    },
                    boxShadow: {
                        'glow': '0 0 40px -10px rgba(0, 102, 255, 0.4)',
                        'glow-hover': '0 0 50px -5px rgba(0, 102, 255, 0.6)',
                        'sheet': '0 0 0 1px rgba(255,255,255,0.05), 0 20px 40px -10px rgba(0,0,0,0.6)',
                    },
                    animation: {
                        'pulse-primary': 'pulsePrimary 2s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'float': 'float 5s ease-in-out infinite',
                        'ring': 'ring 2s ease-in-out infinite',
                        'fadeIn': 'fadeIn 0.2s ease-out',
                        'scaleIn': 'scaleIn 0.2s ease-out',
                        'warning-pulse': 'warningPulse 2s infinite',
                    },
                    keyframes: {
                        pulsePrimary: {
                            '0%, 100%': { opacity: '1' },
                            '50%': { opacity: '.5' },
                        },
                        float: {
                            '0%, 100%': { transform: 'translateY(0) rotate(-2deg)' },
                            '50%': { transform: 'translateY(-5px) rotate(0deg)' },
                        },
                        ring: {
                            '0%, 100%': { transform: 'rotate(0deg)' },
                            '10%, 30%, 50%': { transform: 'rotate(15deg)' },
                            '20%, 40%': { transform: 'rotate(-15deg)' },
                            '60%': { transform: 'rotate(0deg)' }
                        },
                        fadeIn: {
                            '0%': { opacity: '0' },
                            '100%': { opacity: '1' },
                        },
                        scaleIn: {
                            '0%': { transform: 'scale(0.95)', opacity: '0' },
                            '100%': { transform: 'scale(1)', opacity: '1' },
                        },
                        warningPulse: {
                            '0%, 100%': { boxShadow: '0 0 0 0 rgba(0, 102, 255, 0.4)' },
                            '70%': { boxShadow: '0 0 0 10px rgba(0, 102, 255, 0)' }
                        }
                    }
                }
            }
        }
    </script>

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0A0A0A;
            color: #E5E5E5;
            margin: 0;
            padding: 0;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        ::selection { background: rgba(0, 102, 255, 0.3); color: white; }
        h1, h2, h3, h4 { font-family: 'Inter Tight', sans-serif; }

        /* Patrón de fondo y brillos */
        .bg-grid-pattern {
            background-size: 50px 50px;
            background-image: 
                linear-gradient(to right, rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            mask-image: radial-gradient(circle at center, black 40%, transparent 100%);
            -webkit-mask-image: radial-gradient(circle at 50% 30%, black 40%, transparent 100%);
            pointer-events: none;
        }
        .bg-ambient-glow {
            position: fixed; top: 10%; left: 50%;
            width: 80vw; height: 80vw; max-width: 800px; max-height: 800px;
            background: radial-gradient(circle, rgba(0, 102, 255, 0.06) 0%, rgba(0,0,0,0) 70%);
            transform: translate(-50%, -50%); pointer-events: none; z-index: 0;
        }

        /* Marca de agua global */
        .web-watermark {
            position: fixed; bottom: 30px; right: -20px; font-size: 4rem; font-weight: 900;
            color: rgba(255, 255, 255, 0.02); pointer-events: none; z-index: 0;
            transform: rotate(-10deg); white-space: nowrap; user-select: none;
        }

        /* Scrollbars */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #262626; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #444; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }

        /* Componentes Base (UI) */
        .glass-card {
            background: rgba(22, 22, 24, 0.4);
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 0.75rem; transition: border-color 0.3s ease;
        }
        .glass-card:focus-within { border-color: rgba(0, 102, 255, 0.3); }

        .input-field { 
            background-color: rgba(0,0,0,0.3); border: 1px solid #262626; color: #F4F4F5; 
            padding: 0.65rem 0.85rem; border-radius: 0.5rem; font-size: 0.875rem; 
            transition: all 0.2s; width: 100%; 
        }
        .input-field:focus { 
            outline: none; border-color: #0066FF; 
            box-shadow: 0 0 0 2px rgba(0, 102, 255, 0.2), inset 0 1px 2px rgba(0,0,0,0.5); 
            background-color: rgba(0,0,0,0.5);
        }
        .input-field::placeholder { color: #52525B; }

        /* Contenedor especial para el Input de Tags */
        .input-field-wrapper {
            background-color: rgba(0,0,0,0.3); border: 1px solid #262626; color: #F4F4F5; 
            padding: 0.4rem 0.6rem; border-radius: 0.5rem; font-size: 0.875rem; 
            transition: all 0.2s; width: 100%; display: flex; flex-wrap: wrap; gap: 0.4rem; align-items: center; min-height: 46px;
        }
        .input-field-wrapper:focus-within {
            outline: none; border-color: #0066FF; 
            box-shadow: 0 0 0 2px rgba(0, 102, 255, 0.2), inset 0 1px 2px rgba(0,0,0,0.5); 
            background-color: rgba(0,0,0,0.5);
        }

        /* Ajustes precisos para exportación PDF */
        @media print {
            body { background: #f3f4f6 !important; overflow: auto !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            .bg-grid-pattern, .bg-ambient-glow, .web-watermark { display: none !important; }
            aside, header.print-hidden, #topWarningHeader, #igAlertModal { display: none !important; }
            main { background: none !important; padding: 0 !important; overflow: visible !important; height: auto !important; width: 100% !important; }
            .document-container { max-width: 100% !important; margin: 0 !important; box-shadow: none !important; border: none !important; }
            .print\:text-black { color: #000 !important; }
            .print\:text-gray-800 { color: #1f2937 !important; }
            .print\:text-gray-600 { color: #4B5563 !important; }
            .print\:bg-white { background-color: #FFF !important; }
            .print\:bg-gray-50 { background-color: #F9FAFB !important; }
            .print\:border-gray-200 { border-color: #E5E7EB !important; }
            #root { overflow: visible !important; height: auto !important; display: block !important; }
            .flex.h-screen { display: block !important; height: auto !important; overflow: visible !important;}
        }
    </style>
</head>
<body class="bg-brand-bg text-gray-300 font-sans relative min-h-[100dvh]">
    <div class="fixed inset-0 bg-grid-pattern pointer-events-none z-0"></div>
    <div class="bg-ambient-glow"></div>
    <div class="web-watermark font-display tracking-tighter hidden md:block z-0">@necesitodisenos</div>

    <div id="root" class="relative z-10"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- CONSTANTES ---
        const MAX_IMAGE_SIZE_MB = 2; // Límite de 2MB
        const MAX_IMAGE_SIZE_BYTES = MAX_IMAGE_SIZE_MB * 1024 * 1024;

        // --- DATOS POR DEFECTO ---
        const DEFAULT_DATA = {
            agencyName: '@necesitodisenos',
            agencyWeb: 'www.necesitodisenos.com',
            agencyLogo: null,
            documentColor: '#0066FF',
            cliente: '',
            proyecto: '',
            descripcion: '',
            historia: '', 
            dolores: '', 
            objetivos: '',
            publico: '',
            competencia: '',
            diferenciador: '',
            valores: [], 
            tono: [],    
            noHacer: '', 
            colores: ['#0066FF', '#121212', '#FFFFFF'],
            entregables: [
                { id: 1, nombre: 'Diseño de Logotipo', formato: 'Vectorial (AI, EPS, SVG)' }
            ],
            canales: [], 
            presupuesto: '',
            deadline: '',
            referencias: [null, null, null, null]
        };

        // --- FUNCIONES HELPER ---
        const hexToRgba = (hex, opacity) => {
            let h = hex.replace('#', '');
            if (h.length === 3) h = h[0] + h[0] + h[1] + h[1] + h[2] + h[2];
            const r = parseInt(h.substring(0, 2), 16) || 0;
            const g = parseInt(h.substring(2, 4), 16) || 0;
            const b = parseInt(h.substring(4, 6), 16) || 0;
            return `rgba(${r}, ${g}, ${b}, ${opacity})`;
        };

        // --- COMPONENTES UI ---
        const InputField = ({ label, value, onChange, placeholder, isTextarea = false, helperText }) => (
            <div className="mb-5">
                <label className="block text-[0.7rem] font-poppins font-bold uppercase tracking-[0.05em] text-gray-400 mb-1.5">{label}</label>
                {helperText && <p className="text-[11px] text-gray-500 mb-2 leading-tight">{helperText}</p>}
                {isTextarea ? (
                    <textarea value={value} onChange={onChange} placeholder={placeholder} rows="3" className="input-field resize-y min-h-[80px]" />
                ) : (
                    <input type="text" value={value} onChange={onChange} placeholder={placeholder} className="input-field" />
                )}
            </div>
        );

        const TagInput = ({ label, tags, onAddTag, onRemoveTag, placeholder, helperText }) => {
            const [inputValue, setInputValue] = useState('');
            const safeTags = Array.isArray(tags) ? tags : [];
            
            const handleAdd = () => {
                if (inputValue.trim() !== '') {
                    onAddTag(inputValue.trim());
                    setInputValue('');
                }
            };

            const handleKeyDown = (e) => {
                if (e.key === 'Enter' || e.key === ',') {
                    e.preventDefault(); 
                    handleAdd();
                } else if (e.key === 'Backspace' && inputValue === '' && safeTags.length > 0) {
                    onRemoveTag(safeTags.length - 1);
                }
            };

            return (
                <div className="mb-5">
                    <label className="block text-[0.7rem] font-poppins font-bold uppercase tracking-[0.05em] text-gray-400 mb-1.5">{label}</label>
                    {helperText && <p className="text-[11px] text-gray-500 mb-2 leading-tight">{helperText}</p>}
                    <div className="input-field-wrapper">
                        {safeTags.map((tag, i) => (
                            <span key={i} className="bg-brand-primary text-white text-[11px] px-2.5 py-1 rounded-md flex items-center gap-1.5 font-bold tracking-wide shadow-glow">
                                {tag}
                                <i className="ph-bold ph-x cursor-pointer hover:text-black transition-colors" onClick={() => onRemoveTag(i)}></i>
                            </span>
                        ))}
                        <div className="flex-1 flex min-w-[140px] items-center gap-2">
                            <input
                                type="text"
                                value={inputValue}
                                onChange={e => setInputValue(e.target.value)}
                                onKeyDown={handleKeyDown}
                                className="bg-transparent outline-none text-white text-sm w-full"
                                placeholder={safeTags.length === 0 ? placeholder : "Escribe y presiona +"}
                            />
                            <button 
                                type="button" 
                                onClick={handleAdd} 
                                className="text-gray-400 hover:text-brand-primary transition-colors p-1"
                                title="Agregar"
                            >
                                <i className="ph-bold ph-plus-circle text-lg"></i>
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        const SectionCard = ({ title, icon, children }) => (
            <div className="glass-card p-5 mb-6">
                <div className="flex items-center gap-2 mb-5 border-b border-white/5 pb-3">
                    <i className={`ph-fill ${icon} text-lg text-brand-primary`}></i>
                    <h2 className="text-sm font-bold text-white font-display tracking-wide">{title}</h2>
                </div>
                {children}
            </div>
        );

        const UploadBox = ({ title, onChange, previewUrl, customClass = "h-28 w-full", imageClass = "object-cover", maxSizeText = `Máx. ${MAX_IMAGE_SIZE_MB}MB` }) => (
            <div className={`relative border border-dashed border-brand-border hover:border-brand-primary/50 rounded-lg overflow-hidden flex flex-col items-center justify-center text-center cursor-pointer transition-colors bg-black/30 group mb-2 ${customClass}`}>
                <input type="file" accept="image/*" onChange={onChange} className="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10" />
                {previewUrl ? (
                    <img src={previewUrl} className={`w-full h-full group-hover:scale-105 transition-transform duration-300 ${imageClass}`} alt="Preview" />
                ) : (
                    <div className="flex flex-col items-center p-3">
                        <i className="ph-bold ph-image text-2xl text-gray-500 group-hover:text-brand-primary mb-1 transition-colors"></i>
                        <p className="text-[10px] font-medium text-gray-400 uppercase tracking-widest leading-tight">{title}</p>
                        <p className="text-[9px] text-gray-500 mt-1">{maxSizeText}</p>
                    </div>
                )}
            </div>
        );

        // --- APP PRINCIPAL ---
        function App() {
            const [data, setData] = useState(() => {
                const saved = localStorage.getItem('briefPro_data_v6'); 
                if (saved) {
                    try {
                        return JSON.parse(saved);
                    } catch (e) {
                        return DEFAULT_DATA;
                    }
                }
                return DEFAULT_DATA;
            });

            const [isExporting, setIsExporting] = useState(false);
            const [isResetModalOpen, setIsResetModalOpen] = useState(false);
            const [isExportModalOpen, setIsExportModalOpen] = useState(false);
            const [isIgAlertOpen, setIsIgAlertOpen] = useState(false); 
            const [isHeaderVisible, setIsHeaderVisible] = useState(true);
            const [errorMsg, setErrorMsg] = useState(null);

            useEffect(() => {
                try {
                    localStorage.setItem('briefPro_data_v6', JSON.stringify(data));
                } catch (e) {
                    console.warn("Exceso de cuota en localStorage. Guardando datos de forma segura...");
                    const safeData = { ...data, agencyLogo: null, referencias: [null, null, null, null] };
                    localStorage.setItem('briefPro_data_v6', JSON.stringify(safeData));
                }
            }, [data]);

            // Lógica para mostrar el Pop-up de Instagram una sola vez por persona
            useEffect(() => {
                const hasSeenAlert = localStorage.getItem('brief_new_ig_alert');
                if (!hasSeenAlert) {
                    setTimeout(() => {
                        setIsIgAlertOpen(true);
                        localStorage.setItem('brief_new_ig_alert', 'true');
                    }, 1500);
                }
            }, []);

            // Handlers Genéricos
            const handleChange = (field, value) => setData(prev => ({ ...prev, [field]: value }));

            // Handlers Arrays (Tags)
            const handleAddTag = (field, value) => {
                if (!Array.isArray(data[field])) {
                    setData(prev => ({ ...prev, [field]: [value] }));
                    return;
                }
                if (!data[field].includes(value)) {
                    setData(prev => ({ ...prev, [field]: [...prev[field], value] }));
                }
            };
            const handleRemoveTag = (field, indexToRemove) => {
                setData(prev => ({ ...prev, [field]: prev[field].filter((_, i) => i !== indexToRemove) }));
            };

            // Handlers Colores
            const addColor = (e) => {
                const newColor = e.target.value;
                if (!data.colores.includes(newColor)) {
                    setData(prev => ({ ...prev, colores: [...prev.colores, newColor] }));
                }
            };
            const removeColor = (indexToRemove) => {
                setData(prev => ({ ...prev, colores: prev.colores.filter((_, index) => index !== indexToRemove) }));
            };

            // Handlers Entregables
            const addEntregable = () => setData(prev => ({ ...prev, entregables: [...prev.entregables, { id: Date.now(), nombre: '', formato: '' }] }));
            const updateEntregable = (id, field, value) => setData(prev => ({ ...prev, entregables: prev.entregables.map(item => item.id === id ? { ...item, [field]: value } : item) }));
            const removeEntregable = (id) => setData(prev => ({ ...prev, entregables: prev.entregables.filter(item => item.id !== id) }));

            // Handlers Imágenes Agencia
            const handleAgencyLogoUpload = (e) => {
                const file = e.target.files[0];
                if (file) {
                    if (file.size > MAX_IMAGE_SIZE_BYTES) {
                        setErrorMsg(`El archivo que intentas subir es demasiado pesado. El límite es de ${MAX_IMAGE_SIZE_MB}MB.`);
                        e.target.value = '';
                        return;
                    }
                    const reader = new FileReader();
                    reader.onload = (ev) => handleChange('agencyLogo', ev.target.result);
                    reader.readAsDataURL(file);
                }
            };
            const removeAgencyLogo = (e) => {
                e.stopPropagation();
                handleChange('agencyLogo', null);
            };

            // Handlers Imágenes Referencia
            const handleImageUpload = (e, index) => {
                const file = e.target.files[0];
                if (file) {
                    if (file.size > MAX_IMAGE_SIZE_BYTES) {
                        setErrorMsg(`La imagen que intentas subir es demasiado pesada. El límite por imagen es de ${MAX_IMAGE_SIZE_MB}MB.`);
                        e.target.value = '';
                        return;
                    }
                    const reader = new FileReader();
                    reader.onload = (ev) => {
                        const newRefs = [...data.referencias];
                        newRefs[index] = ev.target.result;
                        setData(prev => ({ ...prev, referencias: newRefs }));
                    };
                    reader.readAsDataURL(file);
                }
            };
            const removeImage = (e, index) => {
                e.stopPropagation();
                const newRefs = [...data.referencias];
                newRefs[index] = null;
                setData(prev => ({ ...prev, referencias: newRefs }));
            };

            const handleResetClick = () => setIsResetModalOpen(true);
            const executeReset = () => {
                localStorage.removeItem('briefPro_data_v6');
                setData(DEFAULT_DATA);
                setIsResetModalOpen(false);
            };
            const closeResetModal = () => setIsResetModalOpen(false);

            // Descargar PDF
            const handleExportPDF = () => {
                setIsExporting(true);
                setIsExportModalOpen(true); 
                
                setTimeout(() => {
                    const element = document.getElementById('document-to-export');
                    const w = element.offsetWidth;
                    const h = element.offsetHeight;

                    const opt = {
                        margin:       0,
                        filename:     `Brief_${data.cliente || 'Cliente'}.pdf`,
                        image:        { type: 'jpeg', quality: 0.98 },
                        html2canvas:  { scale: 2, useCORS: true, logging: false, width: w, height: h },
                        jsPDF:        { unit: 'px', format: [w, h], orientation: 'portrait' }
                    };
                    
                    html2pdf().set(opt).from(element).save().then(() => {
                        setIsExporting(false);
                        setIsExportModalOpen(false);
                    });
                }, 1500);
            };

            const calculateProgress = () => {
                const requiredFields = [data.cliente, data.proyecto, data.descripcion, data.objetivos, data.publico];
                const filled = requiredFields.filter(f => f && f.trim().length > 0).length;
                return Math.round((filled / requiredFields.length) * 100);
            };

            const hasReferences = data.referencias.some(ref => ref !== null);

            return (
                <>
                    {}
                    {isIgAlertOpen && (
                        <div id="igAlertModal" className="fixed inset-0 z-[300000] flex items-center justify-center bg-black/80 backdrop-blur-md p-4 animate-fadeIn">
                            <div className="bg-[#121212] border border-brand-primary/30 rounded-2xl w-full max-w-[440px] shadow-[0_0_50px_rgba(0,102,255,0.25)] overflow-hidden relative animate-scaleIn">
                                <div className="absolute top-0 left-0 right-0 h-[3px] bg-brand-primary shadow-glow"></div>
                                <div className="p-6 text-center flex flex-col items-center">
                                    <div className="w-14 h-14 bg-brand-primary/10 rounded-full flex items-center justify-center mb-4 border border-brand-primary/20 animate-warning-pulse">
                                        <i className="ph-fill ph-instagram-logo text-brand-primary text-3xl"></i>
                                    </div>
                                    <h3 className="text-xl font-display font-bold text-white mb-2 tracking-tight">Tenemos nueva cuenta</h3>
                                    <p className="text-gray-400 text-sm mb-5 leading-relaxed">
                                        Lamentablemente nos bajaron nuestra cuenta anterior. Mientras resolvemos el problema, creamos este espacio alternativo para seguir compartiendo contenido con vos.
                                    </p>
                                    
                                    <div className="w-full bg-black/40 border border-white/5 rounded-xl p-3.5 mb-5 flex items-center justify-between">
                                        <span className="text-xs text-gray-400 font-medium">Nueva cuenta oficial:</span>
                                        <a href="https://www.instagram.com/necesitodisenos.ok/" target="_blank" className="text-sm font-bold text-white hover:text-brand-primary underline transition-colors">@necesitodisenos.ok</a>
                                    </div>
                                    
                                    <div className="flex flex-col gap-2 w-full">
                                        <a href="https://www.instagram.com/necesitodisenos.ok/" target="_blank" onClick={() => setIsIgAlertOpen(false)} className="w-full bg-brand-primary hover:bg-brand-hover text-white font-bold text-xs py-3.5 rounded-xl shadow-glow transition-all uppercase tracking-wider flex items-center justify-center gap-1.5">
                                            <i className="ph-bold ph-arrow-square-out text-base"></i> Abrir en Instagram
                                        </a>
                                        <button onClick={() => setIsIgAlertOpen(false)} className="text-gray-500 hover:text-white text-xs font-bold uppercase tracking-widest transition-colors py-2.5">
                                            Cerrar ventana
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* PANTALLA DE BLOQUEO MOBILE */}
                    <div className="md:hidden fixed inset-0 z-[200000] bg-[#0A0A0A] flex flex-col items-center justify-center p-6 text-center">
                        <div className="bg-brand-card border border-brand-border rounded-2xl p-8 max-w-[340px] w-full shadow-2xl relative overflow-hidden animate-scaleIn">
                            <div className="absolute top-0 left-0 right-0 h-1 bg-brand-primary shadow-glow"></div>
                            <div className="w-16 h-16 bg-brand-primary/10 border border-brand-primary/20 rounded-full flex items-center justify-center mx-auto mb-6 relative">
                                <i className="ph-fill ph-desktop text-brand-primary text-3xl relative z-10"></i>
                            </div>
                            <h2 className="text-2xl font-display font-bold text-white mb-3 tracking-tight">Usá una computadora</h2>
                            <p className="text-gray-400 text-sm mb-6 leading-relaxed">

                                                    <div className="flex gap-1.5 flex-wrap">
                                                        {data.colores.map((color, i) => (
                                                            <div key={i} className="w-6 h-6 rounded-full border border-gray-300 shadow-sm" style={{ backgroundColor: color }} title={color}></div>
                                                        ))}
                                                    </div>
                                                </div>
                                            </div>
                                        </div>

                                        <div>
                                            <h3 className="text-xs font-poppins font-bold uppercase tracking-widest text-black border-b border-gray-200 pb-2 mb-6">Alcance y Entregables</h3>
                                            
                                            <div className="mb-6">
                                                <p className="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-2">Canales de Distribución</p>
                                                <div className="flex flex-wrap gap-2">
                                                    {(Array.isArray(data.canales) && data.canales.length > 0) ? data.canales.map((c, i) => (
                                                        <span key={i} className="px-2.5 py-1 text-xs font-bold rounded-md border break-words" style={{ backgroundColor: hexToRgba(data.documentColor, 0.1), color: data.documentColor, borderColor: hexToRgba(data.documentColor, 0.2) }}>{c}</span>
                                                    )) : <span className="text-gray-400 text-sm">-</span>}
                                                </div>
                                            </div>

                                            <table className="w-full text-left border-collapse mb-6">
                                                <thead>
                                                    <tr className="bg-gray-50 border-b border-gray-200">
                                                        <th className="py-3 px-4 text-xs font-bold text-gray-500 uppercase tracking-widest w-12 text-center">#</th>
                                                        <th className="py-3 px-4 text-xs font-bold text-gray-500 uppercase tracking-widest">Item a entregar</th>
                                                        <th className="py-3 px-4 text-xs font-bold text-gray-500 uppercase tracking-widest">Especificaciones / Formato</th>
                                                    </tr>
                                                </thead>
                                                <tbody>
                                                    {data.entregables.filter(e => e.nombre || e.formato).map((item, idx) => (
                                                        <tr key={item.id} className="border-b border-gray-100 last:border-0">
                                                            <td className="py-4 px-4 text-xs font-bold text-gray-400 text-center">{idx + 1}</td>
                                                            <td className="py-4 px-4 text-sm font-bold text-black break-words">{item.nombre || '-'}</td>
                                                            <td className="py-4 px-4 text-sm text-gray-600 break-words">{item.formato || '-'}</td>
                                                        </tr>
                                                    ))}
                                                    {data.entregables.filter(e => e.nombre || e.formato).length === 0 && (
                                                        <tr><td colSpan="3" className="py-4 text-center text-sm text-gray-400 italic">No se han definido entregables.</td></tr>
                                                    )}
                                                </tbody>
                                            </table>

                                            <div className="flex justify-end gap-8 text-white p-4 rounded-lg" style={{ backgroundColor: data.documentColor }}>
                                                <div className="text-right">
                                                    <p className="text-[10px] font-bold text-white/70 uppercase tracking-widest">Deadline Final</p>
                                                    <p className="font-bold text-lg break-words">{data.deadline || 'Por definir'}</p>
                                                </div>
                                                <div className="w-px bg-white/20"></div>
                                                <div className="text-right pr-4">
                                                    <p className="text-[10px] font-bold text-white/70 uppercase tracking-widest">Presupuesto</p>
                                                    <p className="font-bold text-lg break-words">{data.presupuesto || 'Por definir'}</p>
                                                </div>
                                            </div>
                                        </div>

                                        {hasReferences && (
                                            <div>
                                                <h3 className="text-xs font-poppins font-bold uppercase tracking-widest text-black border-b border-gray-200 pb-2 mb-6">Referencias (Moodboard)</h3>
                                                <div className="grid grid-cols-2 gap-4 auto-rows-[160px] md:auto-rows-[200px]">
                                                    {data.referencias.map((ref, idx) => ref && (
                                                        <div key={idx} 
                                                             className="rounded-xl border border-gray-200 shadow-sm bg-gray-50 bg-cover bg-center bg-no-repeat h-full w-full" 
                                                             style={{ backgroundImage: `url(${ref})` }}>
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                        )}

                                    </div>

                                    {/* Footer Documento */}
                                    <div className="bg-gray-900 text-white p-8 mt-12 rounded-b-xl print:rounded-none">
                                        <div className="flex justify-between items-center">
                                            <div>
                                                <p className="font-bold text-lg font-display mb-1 break-words">Documento Confidencial</p>
                                                <p className="text-xs text-gray-400 font-mono break-words">Generado el {new Date().toLocaleDateString()}</p>
                                            </div>
                                            <div className="text-right flex items-center gap-4">
                                                <div className="flex flex-col items-end">
                                                    <p className="text-[10px] font-bold uppercase tracking-widest mb-1 font-poppins" style={{ color: data.documentColor }}>ESTUDIO / AGENCIA</p>
                                                    <p className="font-bold text-white mb-0.5 break-words">{data.agencyName || '@tuagencia'}</p>
                                                    {data.agencyWeb && <p className="text-xs text-gray-400 font-mono break-words">{data.agencyWeb}</p>}
                                                </div>
                                                {data.agencyLogo && (
                                                    <div className="h-12 w-12 bg-white/10 rounded-lg shrink-0 bg-no-repeat bg-center bg-contain" 
                                                         style={{ backgroundImage: `url(${data.agencyLogo})`, backgroundOrigin: 'content-box', padding: '6px' }}>
                                                    </div>
                                                )}
                                            </div>
                                        </div>
                                    </div>

                                </div>
                            </div>
                        </main>

                        {/* Modal Confirmación de Reseteo */}
                        {isResetModalOpen && (
                            <div className="fixed inset-0 z-[10000] flex items-center justify-center bg-black/80 backdrop-blur-sm animate-fadeIn">
                                <div className="bg-brand-card border border-brand-border rounded-xl p-6 max-w-sm w-[90%] shadow-2xl animate-scaleIn">
                                    <h3 className="text-lg font-bold text-white mb-2 flex items-center gap-2 font-display">
                                        <i className="ph-fill ph-warning-circle text-brand-primary"></i> ¿Limpiar documento?
                                    </h3>
                                    <p className="text-sm text-gray-400 mb-6">Se borrarán todos tus datos ingresados y referencias. Esta acción no se puede deshacer.</p>
                                    <div className="flex justify-end gap-3">
                                        <button onClick={closeResetModal} className="px-4 py-2 rounded-lg text-sm font-medium text-gray-300 hover:text-white hover:bg-white/10 transition-colors">
                                            Cancelar
                                        </button>
                                        <button onClick={executeReset} className="px-4 py-2 rounded-lg text-sm font-bold bg-brand-primary text-white hover:bg-brand-hover shadow-glow transition-all">
                                            Sí, limpiar
                                        </button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* Modal de ERROR de subida de imagen */}
                        {errorMsg && (
                            <div className="fixed inset-0 z-[150000] flex items-center justify-center bg-black/80 backdrop-blur-sm animate-fadeIn p-4">
                                <div className="bg-brand-card border border-red-500/30 rounded-xl p-6 max-w-sm w-full shadow-2xl animate-scaleIn relative overflow-hidden">
                                    <div className="absolute top-0 left-0 right-0 h-1 bg-red-500 shadow-glow"></div>
                                    <h3 className="text-lg font-bold text-white mb-3 flex items-center gap-2 font-display">
                                        <i className="ph-fill ph-warning-octagon text-red-500 text-2xl"></i> 
                                        Imagen muy pesada
                                    </h3>
                                    <p className="text-sm text-gray-300 mb-6 leading-relaxed">
                                        {errorMsg}
                                    </p>
                                    <div className="flex justify-end">
                                        <button onClick={() => setErrorMsg(null)} className="px-5 py-2.5 rounded-lg text-sm font-bold bg-white/10 hover:bg-white/20 text-white transition-colors">
                                            Entendido
                                        </button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* Modal de Carga (Exportación PDF) */}
                        {isExportModalOpen && (
                            <div className="fixed inset-0 z-[100000] flex items-center justify-center bg-black/80 backdrop-blur-md animate-fadeIn p-4">
                                <div className="bg-brand-card border border-brand-border rounded-2xl w-full max-w-[500px] shadow-2xl animate-scaleIn overflow-hidden relative">
                                    <div className="flex flex-col items-center justify-center p-12 text-center">
                                        <div className="w-16 h-16 relative flex items-center justify-center mb-6">
                                            <div className="absolute inset-0 border-[3px] border-white/5 rounded-full"></div>
                                            <div className="absolute inset-0 border-[3px] border-brand-primary rounded-full border-t-transparent animate-spin"></div>
                                            <i className="ph-fill ph-file-pdf text-brand-primary text-xl absolute"></i>
                                        </div>
                                        <h3 className="text-xl font-display font-bold text-white mb-2">Generando documento...</h3>
                                        <p className="text-gray-400 text-sm">Por favor esperá unos segundos.</p>
                                    </div>
                                </div>
                            </div>
                        )}

                    </div>
                </>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
